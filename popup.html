<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="header">
    <h1><span class="highlight">Study</span>Snap</h1>
    <p>Seamlessly transfer YouTube screen grabs straight to Notion.</p>
  </div>

  <div id="auth-section" class="section">
    <h2>Connect Notion</h2>
    <p class="subtitle">Enter your Notion API Key</p>
    <div class="input-group">
      <input type="password" id="notion-token" placeholder="Your API key..." autocomplete="off">
    </div>
    <button id="btn-login" class="primary-btn">Connect</button>
  </div>

  <div id="session-section" class="section hidden">
    <h2>Capture Setup</h2>
    
    <label for="page-dropdown">Target Notion Page</label>
    <div class="select-container">
      <select id="page-dropdown">
        <option value="" disabled selected>Loading pages...</option>
      </select>
    </div>

    <div class="session-actions">
      <button id="btn-start" class="primary-btn pulse">Start Session</button>
      <button id="btn-end" class="secondary-btn hidden">End Session</button>
    </div>
    <p id="session-status" class="status-msg"></p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
